<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication & Interactions Sociales — Synthèse</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Communication &amp; Interactions Sociales</h1>
  <p>Synthèse du cours — L1, 2025-2026 — Sarah Cordonnier, Univ. Lyon 2</p>
</header>

<nav>
  <button class="active" data-view="models">Modèles</button>
  <button data-view="authors">Auteurs</button>
  <button data-view="concepts">Concepts</button>
  <button data-view="ouvrages">Ouvrages</button>
  <button data-view="timeline">Frise</button>
</nav>

<div class="seance-bar">
  <span class="seance-bar-label">Séance :</span>
  <div class="filter-row" id="globalSeanceFilter"></div>
</div>

<main>

  <!-- ════════════════ MODELS VIEW ════════════════ -->
  <section id="models" class="view active"></section>

  <!-- ════════════════ AUTHORS VIEW ════════════════ -->
  <section id="authors" class="view">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Rechercher un auteur…">
    </div>
    <div class="authors-grid" id="authorsGrid"></div>
  </section>

  <!-- ════════════════ CONCEPTS VIEW ════════════════ -->
  <section id="concepts" class="view">
    <div class="search-bar">
      <input type="text" id="searchConcepts" placeholder="Rechercher un concept…">
    </div>
    <div id="conceptsFilters"></div>
    <div class="concepts-list" id="conceptsList"></div>
  </section>

  <!-- ════════════════ OUVRAGES VIEW ════════════════ -->
  <section id="ouvrages" class="view">
    <div class="search-bar">
      <input type="text" id="searchOuvrages" placeholder="Rechercher un ouvrage, un auteur…">
    </div>
    <div class="ouvrages-list" id="ouvragesList"></div>
  </section>

  <!-- ════════════════ TIMELINE VIEW ════════════════ -->
  <section id="timeline" class="view">
    <div class="tl-legend" id="tlLegend">
      <div class="tl-legend-item"><span class="tl-legend-dot model-legend"></span> Modèle / courant</div>
      <div class="tl-legend-item"><span class="tl-legend-dot work-legend"></span> Œuvre clé</div>
    </div>
    <div class="timeline" id="timelineContainer"></div>
  </section>

</main>

<!-- ════════════════ DETAIL OVERLAY ════════════════ -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script src="app.js"></script>
</body>
</html>
